name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host:
    name: Rust host（build + test）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: host
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --verbose
      - run: cargo test --verbose

  extension:
    name: VSCode 扩展（语法 + discover 单元）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host/integrations/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: host/integrations/vscode/package-lock.json
      - run: npm ci
      - name: 语法检查
        run: node -c extension.js && node -c discover.js
      - name: 单元测试（discover 自动发现/选择，纯函数）
        run: npm run test:unit
