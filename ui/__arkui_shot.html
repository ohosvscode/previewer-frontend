<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="./src/style.css"/>
<style>
body{margin:0}.ai-bar{display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid #000;background:var(--panel-bg)}
.ai-btn{background:#32343a;color:var(--text);border:1px solid #3c3f46;border-radius:6px;padding:5px 12px;cursor:pointer}
.ai-status{color:var(--muted);font-size:12px}.ai-status.ok{color:#4ec98a}.ai-status.error{color:#e26d6d}
.ai-body{display:flex;align-items:flex-start}.ai-screen{flex:0 0 auto;padding:12px 14px;position:sticky;top:49px}
.ai-screen-wrap{position:relative;display:inline-block;background:#000;border-radius:8px;overflow:hidden}
#shot{display:block;max-height:70vh;width:auto}#shot-hint{color:var(--muted);font-size:11px;padding:30px 10px;text-align:center}
#hl{position:absolute;display:none;pointer-events:none;border:2px solid var(--accent,#4ea1ff);background:rgba(78,161,255,.18);z-index:3}
#panel{flex:1 1 auto;min-width:0;padding:8px 14px 24px}.inspector-tree{max-height:none}.insp-tab-body{max-height:none}
</style></head><body>
<div class="ai-bar"><button id="refresh" class="ai-btn">⟳ 刷新</button><span id="status" class="ai-status"></span></div>
<div class="ai-body"><div class="ai-screen"><div class="ai-screen-wrap">
<img id="shot" alt="设备截图" style="display:none"/><div id="shot-hint">（抓取后显示）</div><div id="hl"></div>
</div></div><div id="panel"></div></div>
<script>
let PAYLOAD=null;
window.acquireVsCodeApi=()=>({postMessage:(m)=>{ if(m&&m.channel==="fetchDeviceTree"){ fetch("./__dev_payload.json").then(r=>r.json()).then(p=>{ PAYLOAD=p; window.postMessage({channel:"deviceTree",tree:p.tree,snapshot:p.snapshot,meta:p.meta},"*"); }); } }});
</script>
<script type="module" src="./src/arkui-inspector.js"></script>
<script type="module">
setTimeout(()=>{ const exp=[...document.querySelectorAll(".insp-tbtn")].find(b=>b.title==="展开全部"); const rt=document.querySelector(".tree-toggle"); if(rt&&rt.textContent==="▸")rt.click(); if(exp)exp.click(); setTimeout(()=>{ const rows=[...document.querySelectorAll(".tree-row")]; const n=rows.find(r=>/Navigation\(11\)/.test(r.textContent)); if(n)n.click(); },400); },900);
</script>
</body></html>
